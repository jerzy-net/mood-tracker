version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=MoodTracker;Username=admin;Password=admin
      Cors__AllowedOrigins__0: http://localhost:5173
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: MoodTracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d MoodTracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
